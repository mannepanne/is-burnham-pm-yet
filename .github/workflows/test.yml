name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test & coverage
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Match the deploy workflow; wrangler 4.x requires Node >= 22.
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Runs the full suite with the enforced coverage thresholds from
      # vitest.config.js, so a PR that drops src/** below the bar fails here.
      - name: Run tests with enforced coverage
        run: npm run test:coverage
